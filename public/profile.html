<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification | RiderID</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="container animate-fade-in" style="max-width: 500px;">
        <header>
            <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: 800; font-size: 0.875rem;">&larr; BACK TO SEARCH</a>
            <div class="logo" style="margin-top: 1.5rem;">RIDER VERIFICATION</div>
            <p id="profileStatusText">Validating Identity...</p>
        </header>

        <main id="profileContent" style="display: none;">
            <div class="glass-card" style="padding: 1.5rem; text-align: center; position: relative;">
                
                <!-- Status Badge -->
                <div id="statusBadge" class="badge badge-pending" style="position: absolute; top: 1rem; right: 1rem; font-size: 0.75rem; padding: 0.25rem 0.75rem;">PENDING</div>

                <!-- Passport Photo -->
                <div style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin: 0 auto 1.5rem; overflow: hidden; background: var(--surface);">
                    <img id="passportImg" src="assets/default-avatar.png" alt="Passport" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                
                <h2 id="riderName" style="margin-bottom: 0.25rem; font-size: 1.5rem;">Rider Name</h2>
                <p id="riderPlate" style="color: var(--primary); font-weight: 900; font-size: 1.25rem; letter-spacing: 1px; margin-bottom: 1.5rem;">PLATE: ---</p>

                <!-- QR Code for quick check -->
                <div class="qr-container" style="margin-bottom: 1.5rem;">
                    <canvas id="qrCode" style="width: 150px !important; height: 150px !important;"></canvas>
                </div>

                <!-- Rider ID Card Details -->
                <div style="text-align: left; background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">Rider ID</span>
                        <span id="riderId" style="font-weight: 700; color: var(--accent);">---</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">Phone</span>
                        <span id="riderPhone" style="font-weight: 600;">---</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">Union</span>
                        <span id="riderUnion" style="font-weight: 600;">---</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">Validity</span>
                        <span id="riderExpiry" style="font-weight: 700; color: var(--primary-light);">---</span>
                    </div>
                </div>

                <!-- Emergency Contact (Crucial for roadside accidents/checks) -->
                <div style="text-align: left; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">
                    <h5 style="color: var(--error); margin-bottom: 0.5rem; font-size: 0.75rem; letter-spacing: 1px;">EMERGENCY CONTACT</h5>
                    <div style="display: flex; justify-content: space-between;">
                        <span id="emergencyName" style="font-weight: 700; font-size: 0.9rem;">---</span>
                        <a id="emergencyCall" href="#" style="color: var(--error); font-weight: 800; text-decoration: none; font-size: 0.9rem;">CALL NOW</a>
                    </div>
                </div>

                <!-- Digital Wallet -->
                <div id="documentsSection" style="text-align: left; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                    <h4 style="margin-bottom: 1rem; color: var(--primary-light); font-size: 0.875rem; letter-spacing: 1px;">DIGITAL DOCUMENT WALLET</h4>
                    <div id="docList" style="display: grid; gap: 0.75rem;">
                        <!-- Docs injected here -->
                    </div>
                </div>
            </div>

            <div style="margin-top: 1.5rem; text-align: center; display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 3rem;">
                <button class="btn btn-outline" onclick="window.print()" style="flex: 1;">PRINT ID</button>
                <a href="index.html" class="btn btn-primary" style="flex: 1; text-decoration: none;">NEW SEARCH</a>
            </div>
        </main>

        <div id="notFound" style="display: none; text-align: center; padding: 4rem 2rem;">
            <h2 style="color: var(--error); margin-bottom: 1rem;">Rider Not Found</h2>
            <p>Verification failed. This rider is not in our system.</p>
            <a href="register.html" class="btn btn-primary" style="margin-top: 2rem; text-decoration: none;">Register New Rider</a>
        </div>
    </div>

    <script>
        async function fetchProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || urlParams.get('id');
            const paymentStatus = urlParams.get('status');
            const paymentRef = urlParams.get('ref');

            if (!query) { window.location.href = 'index.html'; return; }

            try {
                if (paymentStatus === 'success' && paymentRef) {
                    await fetch('/api/payment/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ reference: paymentRef, riderId: query })
                    });
                }

                const response = await fetch(`/api/verify/${query}`);
                const data = await response.json();

                if (data.success) {
                    const rider = data.rider;
                    document.getElementById('profileContent').style.display = 'block';
                    document.getElementById('profileStatusText').textContent = 'Verification Active';
                    
                    document.getElementById('riderName').textContent = rider.name;
                    document.getElementById('riderPlate').textContent = rider.plateNumber.toUpperCase();
                    document.getElementById('riderId').textContent = rider.riderId;
                    document.getElementById('riderPhone').textContent = rider.phone;
                    document.getElementById('riderUnion').textContent = rider.union;
                    document.getElementById('riderExpiry').textContent = rider.expiryDate ? "VALID UNTIL " + rider.expiryDate : 'EXPIRED / INACTIVE';

                    // Passport Photo
                    if (rider.documents && rider.documents.passportPhoto) {
                        document.getElementById('passportImg').src = rider.documents.passportPhoto;
                    }

                    // Emergency Contact
                    if (rider.emergencyContact) {
                        document.getElementById('emergencyName').textContent = rider.emergencyContact.name;
                        document.getElementById('emergencyCall').href = 'tel:' + rider.emergencyContact.phone;
                        document.getElementById('emergencyCall').textContent = rider.emergencyContact.phone;
                    }

                    const badge = document.getElementById('statusBadge');
                    badge.textContent = rider.status.toUpperCase();
                    badge.className = `badge badge-${rider.status.toLowerCase()}`;

                    // Documents Injection
                    const docList = document.getElementById('docList');
                    docList.innerHTML = '';
                    
                    const docLabels = {
                        licenseDoc: "Rider’s License",
                        bikePapers: "Motorcycle Reg. Papers",
                        proofOfOwnership: "Proof of Ownership",
                        insuranceDoc: "Insurance Certificate",
                        ninDoc: "NIN Slip / National ID",
                        unionId: "Union ID Card"
                    };

                    let hasDocs = false;
                    if (rider.documents) {
                        for (const [key, path] of Object.entries(rider.documents)) {
                            if (path && key !== 'passportPhoto') {
                                hasDocs = true;
                                const docDiv = document.createElement('div');
                                docDiv.style.background = 'rgba(255,255,255,0.05)';
                                docDiv.style.padding = '0.75rem';
                                docDiv.style.borderRadius = '0.5rem';
                                docDiv.style.display = 'flex';
                                docDiv.style.justifyContent = 'space-between';
                                docDiv.style.alignItems = 'center';
                                
                                docDiv.innerHTML = `
                                    <span style="font-size: 0.8rem; font-weight: 500;">${docLabels[key]}</span>
                                    <a href="${path}" target="_blank" style="color: var(--primary); font-size: 0.75rem; font-weight: 700; text-decoration: none; border: 1px solid var(--primary); padding: 0.25rem 0.5rem; border-radius: 0.25rem;">VIEW &rarr;</a>
                                `;
                                docList.appendChild(docDiv);
                            }
                        }
                    }

                    if (!hasDocs) document.getElementById('documentsSection').style.display = 'none';

                    // Generate QR
                    QRCode.toCanvas(document.getElementById('qrCode'), window.location.href, {
                        width: 150, margin: 1, color: { dark: '#0f172a', light: '#ffffff' }
                    });

                } else {
                    document.getElementById('notFound').style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                alert('Error loading profile.');
            }
        }

        fetchProfile();
    </script>
</body>
</html>
